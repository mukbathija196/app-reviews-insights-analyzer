name: Weekly Pulse

on:
  workflow_dispatch:
    inputs:
      iso_week:
        description: "Optional ISO week (e.g. 2026-W16)"
        required: false

jobs:
  groww:
    concurrency:
      group: pulse-groww
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --extra reasoning

      - name: Cache HuggingFace
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Run weekly pulse (live MCP delivery in send mode)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PULSE_DATA_DIR: data
        run: |
          if [ -n "${{ github.event.inputs.iso_week }}" ]; then
            uv run pulse run --product groww --iso-week "${{ github.event.inputs.iso_week }}" --email-mode send
          else
            uv run pulse run --product groww --email-mode send
          fi

      - name: Upload run records artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-run-data-${{ github.run_id }}
          path: data/runs/*.json
          if-no-files-found: warn
